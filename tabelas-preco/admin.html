<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Atualizador de Tabelas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0B0C10;
            color: #FFFFFF;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: #11141a;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 40px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #00F0FF;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.desc {
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #E2E8F0;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%;
            background-color: #1A1D24;
            border: 1px solid #2A2E39;
            border-radius: 6px;
            color: #FFFFFF;
            padding: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #00F0FF;
        }

        textarea {
            height: 130px;
            resize: vertical;
            font-family: monospace;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #00F0FF 0%, #0088FF 100%);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }

        .status-loading { background-color: rgba(0, 240, 255, 0.1); color: #00F0FF; border: 1px solid #00F0FF; display: block !important; }
        .status-success { background-color: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid #22c55e; display: block !important; }
        .status-error { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel Admin - Atualizador de Tabelas</h1>
    <p class="desc">Cole os textos recebidos de cada fornecedor para recalcular as margens e atualizar a lista no site automaticamente.</p>

    <div class="form-group">
        <label> GitHub Token (Personal Access Token):</label>
        <input type="password" id="ghToken" placeholder="Cole aqui o seu token ghp_...">
    </div>

    <div class="form-group">
        <label> Usuário do GitHub / Repositório:</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="ghOwner" value="plugincelularesnovaserrana-sys" placeholder="Usuário">
            <input type="text" id="ghRepo" value="PLUGIN-NS-BETA" placeholder="Repositório">
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #2A2E39; margin: 25px 0;">

    <div class="form-group">
        <label> 1. Android Novos</label>
        <textarea id="txtAndroid" placeholder="Cole aqui a lista de Android Novos..."></textarea>
    </div>

    <div class="form-group">
        <label> 2. Acessórios Gerais</label>
        <textarea id="txtAcessorios" placeholder="Cole aqui a lista de Acessórios..."></textarea>
    </div>

    <div class="form-group">
        <label> 3. Apple Novos</label>
        <textarea id="txtAppleNovos" placeholder="Cole aqui a lista de Apple Novos..."></textarea>
    </div>

    <div class="form-group">
        <label> 4. Apple Grade A</label>
        <textarea id="txtAppleGradeA" placeholder="Cole aqui a lista de Apple Grade A..."></textarea>
    </div>

    <button class="btn-submit" onclick="processarEEnviar()"> Atualizar Site no GitHub</button>

    <div id="status"></div>
</div>

<script>
    // Configuração exata do caminho e nome do arquivo dentro da pasta tabelas-preço
    const FILE_PATH = "tabelas-preco/tabelas_atualizadas.json";

    function parseLinha(linha) {
        let linhaLimpa = linha.replace(/^[^\w\d\(\)]+/, '').trim();
        let match = linhaLimpa.match(/[\-\–\—\s]*\(\s*R\$\s*([\d\.\,]+)\s*\)/i);
        if (!match) return null;

        let custoStr = match[1].replace(/\./g, '').replace(',', '.');
        let custo = parseFloat(custoStr);
        if (isNaN(custo)) return null;

        let inicioIdx = match.index;
        let fimIdx = match.index + match[0].length;

        let nomeBruto = linhaLimpa.substring(0, inicioIdx).replace(/[\-\–\—\:]+$/, '').trim();
        let restoLinha = linhaLimpa.substring(fimIdx).replace(/[\-\–\—\:]+$/, '').trim();

        let cores = [];
        if (restoLinha) {
            let corLimpa = restoLinha.replace(/^(Cor|cor)\s*:\s*/i, '').trim();
            if (corLimpa) {
                cores = corLimpa.split(',').map(c => c.trim()).filter(c => c.length > 0);
            }
        }

        return { modelo: nomeBruto, custo: custo, cores: cores };
    }

    function calcularPreco(modelo, custo, tipo) {
        let nomeLower = modelo.toLowerCase();

        if (tipo === 'android_novos' || tipo === 'acessorios') {
            return custo * 1.30; // +30%
        } else if (tipo === 'apple_novos' || tipo === 'apple_grade_a') {
            // iPhones, MacBooks, iPads (+800,00)
            if (['iphone', 'macbook', 'mac ', 'ipad'].some(term => nomeLower.includes(term))) {
                return custo + 800.0;
            }
            // Acessórios Apple (+100%)
            else if (['airpods', 'airtag', 'magsafe', 'apple watch', 'serie ', 'série ', 'fonte apple'].some(term => nomeLower.includes(term))) {
                return custo * 2.00;
            }
            // Drones e demais (+25%)
            else {
                return custo * 1.25;
            }
        }
        return custo;
    }

    // Detecta a subcategoria/marca de cada item com base no nome do modelo.
    // Isso NÃO altera nenhum cálculo de preço, apenas organiza os itens em
    // grupos (categorias) dentro de cada tabela.
    function detectarSubcategoria(nomeLower, tipo) {
        if (tipo === 'android_novos') {
            if (nomeLower.includes('galaxy') || nomeLower.includes('samsung')) return 'SAMSUNG';
            if (nomeLower.includes('moto')) return 'MOTOROLA';
            if (nomeLower.includes('redmi') || nomeLower.includes('poco') || nomeLower.includes('xiaomi') || nomeLower.includes('mi ')) return 'XIAOMI';
            if (nomeLower.includes('infinix')) return 'INFINIX';
            if (nomeLower.includes('realme')) return 'REALME';
            if (nomeLower.includes('honor')) return 'HONOR';
            if (nomeLower.includes('spark') || nomeLower.includes('tecno') || nomeLower.includes('camon')) return 'TECNO';
            if (nomeLower.includes('itel')) return 'ITEL';
            if (nomeLower.includes('multilaser')) return 'MULTILASER';
            if (nomeLower.includes('lg')) return 'LG';
            if (nomeLower.includes('asus') || nomeLower.includes('zenfone')) return 'ASUS';
            return 'OUTRAS MARCAS';
        }

        if (tipo === 'acessorios') {
            if (nomeLower.includes('fone') || nomeLower.includes('headset') || nomeLower.includes('earbud') || nomeLower.includes('headphone')) return 'FONES DE OUVIDO';
            if (nomeLower.includes('carregador') || nomeLower.includes('fonte') || nomeLower.includes('turbo')) return 'CARREGADORES';
            if (nomeLower.includes('cabo')) return 'CABOS';
            if (nomeLower.includes('capa') || nomeLower.includes('capinha') || nomeLower.includes('case')) return 'CAPAS E CASES';
            if (nomeLower.includes('pelicula') || nomeLower.includes('película') || nomeLower.includes('vidro')) return 'PELÍCULAS E VIDROS';
            if (nomeLower.includes('power bank') || nomeLower.includes('powerbank') || nomeLower.includes('bateria portat')) return 'POWER BANK';
            if (nomeLower.includes('caixa de som') || nomeLower.includes('speaker') || nomeLower.includes('jbl') || nomeLower.includes('partybox')) return 'CAIXAS DE SOM';
            if (nomeLower.includes('smartwatch') || nomeLower.includes('relogio') || nomeLower.includes('relógio') || nomeLower.includes('watch')) return 'SMARTWATCH';
            if (nomeLower.includes('suporte')) return 'SUPORTES';
            if (nomeLower.includes('drone') || nomeLower.includes('dji')) return 'DRONES';
            if (nomeLower.includes('microfone') || nomeLower.includes('lark') || nomeLower.includes('boya') || nomeLower.includes('hollyland')) return 'MICROFONES';
            return 'OUTROS ACESSÓRIOS';
        }

        if (tipo === 'apple_novos' || tipo === 'apple_grade_a') {
            if (nomeLower.includes('iphone')) return 'IPHONE';
            if (nomeLower.includes('macbook') || nomeLower.includes('mac ')) return 'MACBOOK';
            if (nomeLower.includes('ipad')) return 'IPAD';
            if (nomeLower.includes('apple watch') || nomeLower.includes('série') || nomeLower.includes('serie ')) return 'APPLE WATCH';
            if (nomeLower.includes('airpods')) return 'AIRPODS';
            if (nomeLower.includes('airtag')) return 'AIRTAG';
            if (nomeLower.includes('magsafe') || nomeLower.includes('fonte apple')) return 'ACESSÓRIOS APPLE';
            return 'OUTROS';
        }

        return 'OUTROS';
    }

    // Ordena as subcategorias colocando "OUTRAS/OUTROS" sempre por último
    function ordenarNomesCategoria(nomes) {
        return nomes.sort((a, b) => {
            const aOutros = a.startsWith('OUTR');
            const bOutros = b.startsWith('OUTR');
            if (aOutros && !bOutros) return 1;
            if (!aOutros && bOutros) return -1;
            return a.localeCompare(b, 'pt-BR');
        });
    }

    // Processa o texto colado e devolve uma LISTA de categorias (subcategorias/marcas),
    // cada uma com seus itens já com o preço calculado — o cálculo de preço em si
    // (calcularPreco) permanece exatamente o mesmo de antes.
    function processarTextoParaCategorias(texto, tipo) {
        let grupos = {};
        let linhas = texto.split('\n');

        linhas.forEach(linha => {
            let item = parseLinha(linha);
            if (item) {
                let precoVenda = calcularPreco(item.modelo, item.custo, tipo);
                let subcategoria = detectarSubcategoria(item.modelo.toLowerCase(), tipo);

                if (!grupos[subcategoria]) grupos[subcategoria] = [];

                grupos[subcategoria].push({
                    modelo: item.modelo,
                    preco: `R$ ${precoVenda.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`,
                    cores: item.cores
                });
            }
        });

        let nomesOrdenados = ordenarNomesCategoria(Object.keys(grupos));

        return nomesOrdenados.map(nome => ({
            nome: nome,
            itens: grupos[nome]
        }));
    }

    async function processarEEnviar() {
        const token = document.getElementById('ghToken').value.trim();
        const owner = document.getElementById('ghOwner').value.trim();
        const repo = document.getElementById('ghRepo').value.trim();
        const statusDiv = document.getElementById('status');

        if (!token || !owner || !repo) {
            alert("Por favor, preencha o seu GitHub Token!");
            return;
        }

        statusDiv.className = "status-loading";
        statusDiv.innerText = " Processando tabelas e enviando arquivo atualizado...";

        // Estrutura no formato exato que o index.html lê.
        // Cada tabela agora vem organizada em várias subcategorias/marcas
        // (ex: SAMSUNG, MOTOROLA, XIAOMI... ou IPHONE, IPAD, MACBOOK...),
        // o que faz o index.html exibir automaticamente os botões de
        // subcategoria já organizados — sem precisar alterar o index.html.
        const jsonFinal = {
            tabela_android_acessorios_diversos: {
                categorias: processarTextoParaCategorias(document.getElementById('txtAndroid').value, "android_novos")
            },
            tabela_acessorios: {
                categorias: processarTextoParaCategorias(document.getElementById('txtAcessorios').value, "acessorios")
            },
            tabela_apple_novos: {
                categorias: processarTextoParaCategorias(document.getElementById('txtAppleNovos').value, "apple_novos")
            },
            tabela_apple_grade_a: {
                categorias: processarTextoParaCategorias(document.getElementById('txtAppleGradeA').value, "apple_grade_a")
            }
        };

        const jsonString = JSON.stringify(jsonFinal, null, 2);

        try {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${FILE_PATH}`;
            let sha = "";

            // Busca o SHA do arquivo existente no GitHub para atualização
            const getRes = await fetch(url, {
                headers: { "Authorization": `token ${token}` }
            });

            if (getRes.ok) {
                const fileData = await getRes.json();
                sha = fileData.sha;
            }

            // Converte o JSON para Base64
            const contentBase64 = btoa(unescape(encodeURIComponent(jsonString)));

            const putRes = await fetch(url, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Atualização automática de preços via Admin Web",
                    content: contentBase64,
                    sha: sha ? sha : undefined
                })
            });

            if (putRes.ok) {
                statusDiv.className = "status-success";
                statusDiv.innerText = " Sucesso! Tabela atualizada com sucesso no GitHub!";
            } else {
                const errData = await putRes.json();
                statusDiv.className = "status-error";
                statusDiv.innerText = " Erro ao enviar para o GitHub: " + errData.message;
            }
        } catch (err) {
            statusDiv.className = "status-error";
            statusDiv.innerText = " Erro de conexão: " + err.message;
        }
    }
</script>

</body>
</html>
