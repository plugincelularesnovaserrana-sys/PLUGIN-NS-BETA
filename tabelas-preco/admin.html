<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Atualizador de Tabelas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #0B0C10;
            color: #FFFFFF;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background-color: #11141a;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 40px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 8px;
            color: #00F0FF;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p.desc {
            color: #94A3B8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #E2E8F0;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="password"], textarea {
            width: 100%;
            background-color: #1A1D24;
            border: 1px solid #2A2E39;
            border-radius: 6px;
            color: #FFFFFF;
            padding: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            border-color: #00F0FF;
        }

        textarea {
            height: 130px;
            resize: vertical;
            font-family: monospace;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #00F0FF 0%, #0088FF 100%);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.2s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            display: none;
        }

        .status-loading { background-color: rgba(0, 240, 255, 0.1); color: #00F0FF; border: 1px solid #00F0FF; display: block !important; }
        .status-success { background-color: rgba(34, 197, 94, 0.1); color: #22c55e; border: 1px solid #22c55e; display: block !important; }
        .status-error { background-color: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>Painel Admin - Atualizador de Tabelas</h1>
    <p class="desc">Cole os textos recebidos de cada fornecedor para recalcular as margens e categorizar por marca no site automaticamente.</p>

    <div class="form-group">
        <label> GitHub Token (Personal Access Token):</label>
        <input type="password" id="ghToken" placeholder="Cole aqui o seu token ghp_...">
    </div>

    <div class="form-group">
        <label> Usuário do GitHub / Repositório:</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="ghOwner" value="plugincelularesnovaserrana-sys" placeholder="Usuário">
            <input type="text" id="ghRepo" value="PLUGIN-NS-BETA" placeholder="Repositório">
        </div>
    </div>

    <hr style="border-color: #2A2E39; margin: 25px 0;">

    <div class="form-group">
        <label>1. Tabela Android Novos (+30% Margem):</label>
        <textarea id="txtAndroid" placeholder="Cole o texto bruto de Androids aqui..."></textarea>
    </div>

    <div class="form-group">
        <label>2. Tabela Apple Lacrados (+R$ 150,00 Margem):</label>
        <textarea id="txtApple" placeholder="Cole o texto bruto da Apple Lacrados aqui..."></textarea>
    </div>

    <div class="form-group">
        <label>3. Tabela iPhones Seminovos (+R$ 150,00 Margem):</label>
        <textarea id="txtSeminovos" placeholder="Cole o texto bruto de Seminovos aqui..."></textarea>
    </div>

    <div class="form-group">
        <label>4. Tabela Acessórios e Diversos (+30% Margem):</label>
        <textarea id="txtAcessorios" placeholder="Cole o texto bruto de Acessórios aqui..."></textarea>
    </div>

    <button class="btn-submit" onclick="processarEAtualizar()"> Atualizar Agora</button>

    <div id="status"></div>
</div>

<script>
    // --- REGRAS DE RECONHECIMENTO AUTOMÁTICO DE MARCA/CATEGORIA ---
    function identificarMarcaAndroid(modelo) {
        const m = modelo.toUpperCase();
        if (m.includes("GALAXY") || m.includes("SAMSUNG")) return "Samsung";
        if (m.includes("MOTO") || m.includes("MOTOROLA")) return "Motorola";
        if (m.includes("POCO")) return "Poco";
        if (m.includes("REDMI") || m.includes("NOTE ")) return "Redmi";
        if (m.includes("XIAOMI") || m.includes(" MI ")) return "Xiaomi";
        if (m.includes("REALME")) return "Realme";
        if (m.includes("HONOR")) return "Honor";
        if (m.includes("INFINIX")) return "Infinix";
        if (m.includes("TECNO") || m.includes("SPARK")) return "Tecno";
        if (m.includes("MULTILASER") || m.includes("UP PLAY") || m.includes("VITA")) return "Multilaser";
        return "Outros";
    }

    function identificarMarcaApple(modelo) {
        const m = modelo.toUpperCase();
        if (m.includes("IPHONE")) return "iPhone";
        if (m.includes("IPAD")) return "iPad";
        if (m.includes("MACBOOK") || m.includes("MAC ")) return "MacBook";
        if (m.includes("WATCH")) return "Apple Watch";
        if (m.includes("AIRPODS")) return "AirPods";
        if (m.includes("AIRTAG")) return "AirTag";
        if (m.includes("HOMEPOD")) return "HomePod";
        if (m.includes("CABO") || m.includes("FONTE") || m.includes("CARREGADOR") || m.includes("CAPA")) return "Acessórios";
        return "Outros";
    }

    function identificarMarcaAcessorio(modelo) {
        const m = modelo.toUpperCase();
        if (m.includes("JBL")) return "JBL";
        if (m.includes("GARMIN")) return "Garmin";
        if (m.includes("HAYLOU")) return "Haylou";
        if (m.includes("NINTENDO") || m.includes("SWITCH")) return "Nintendo";
        if (m.includes("PS5") || m.includes("PLAYSTATION") || m.includes("MANETE PS")) return "PlayStation";
        if (m.includes("XBOX") || m.includes("MANETE XBOX")) return "Xbox";
        if (m.includes("META") || m.includes("QUEST")) return "Meta";
        if (m.includes("TABLET SAMSUNG")) return "Tablet Samsung";
        if (m.includes("TABLET REDMI") || m.includes("REDMI PAD")) return "Tablet Redmi";
        if (m.includes("ROBÔ") || m.includes("VACUUM") || m.includes("XIAMI") || m.includes("XIAOMI")) return "Robô Xiaomi";
        if (m.includes("MICROFONE")) return "Microfones";
        if (m.includes("RELÓGIO") || m.includes("SMARTWATCH")) return "Smartwatch";
        return "Outros";
    }

    // --- FUNÇÕES DE AJUSTE DE PREÇO ---
    function aplicarPorcentagem(valorStr, percentual) {
        let num = parseFloat(valorStr.replace(/[^\d]/g, ''));
        if (isNaN(num)) return null;
        let novoVal = num * (1 + percentual / 100);
        return "R$ " + novoVal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function aplicarFixo(valorStr, valorFixo) {
        let num = parseFloat(valorStr.replace(/[^\d]/g, ''));
        if (isNaN(num)) return null;
        let novoVal = num + valorFixo;
        return "R$ " + novoVal.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // --- PARSER DAS LINHAS DE TEXTO ---
    function parseLinha(line, fnCalculoPreco) {
        line = line.trim();
        if (!line) return null;

        // Procura por valores no formato R$ 1.000,00 ou R$1000 ou 1000,00 no final da linha
        const priceRegex = /(?:R\$\s*)?(\d{1,3}(?:\.\d{3})*(?:,\d{2})?|\d+(?:,\d{2})?)\s*$/i;
        const match = line.match(priceRegex);

        if (!match) return null;

        const precoBruto = match[0];
        const precoCalculado = fnCalculoPreco(precoBruto);
        if (!precoCalculado) return null;

        let resto = line.substring(0, match.index).trim();

        // Extrai as cores dentro de parênteses ou traços finais se houver
        let cores = [];
        const coresRegex = /\(([^)]+)\)$/;
        const matchCores = resto.match(coresRegex);

        if (matchCores) {
            cores = matchCores[1].split(/[\/,]/).map(c => c.trim()).filter(Boolean);
            resto = resto.replace(coresRegex, '').trim();
        }

        return {
            modelo: resto,
            preco: precoCalculado,
            cores: cores
        };
    }

    // --- AGRUPADOR E ORDENADOR ---
    function processarTextoParaCategorias(textoBruto, fnCalculo, fnIdentificarMarca) {
        const linhas = textoBruto.split('\n');
        const grupos = {};

        linhas.forEach(line => {
            const item = parseLinha(line, fnCalculo);
            if (item) {
                const marca = fnIdentificarMarca(item.modelo);
                if (!grupos[marca]) {
                    grupos[marca] = [];
                }
                grupos[marca].push(item);
            }
        });

        // Ordenação Alfabética das Marcas
        const marcasOrdenadas = Object.keys(grupos).sort((a, b) => {
            if (a === 'Outros') return 1;
            if (b === 'Outros') return -1;
            return a.localeCompare(b);
        });

        // Monta a estrutura final com modelos ordenados alfabeticamente
        return marcasOrdenadas.map(marca => {
            const itensOrdenados = grupos[marca].sort((a, b) => a.modelo.localeCompare(b.modelo));
            return {
                nome: marca,
                itens: itensOrdenados
            };
        });
    }

    // --- FUNÇÃO PRINCIPAL DE ATUALIZAÇÃO ---
    async function processarEAtualizar() {
        const token = document.getElementById("ghToken").value.trim();
        const owner = document.getElementById("ghOwner").value.trim();
        const repo = document.getElementById("ghRepo").value.trim();
        const statusDiv = document.getElementById("status");

        if (!token) {
            alert("Por favor, insira o seu Token do GitHub.");
            return;
        }

        statusDiv.className = "status-loading";
        statusDiv.innerText = " Processando tabelas, categorizando marcas e atualizando GitHub...";

        try {
            // Processa cada textarea com suas devidas regras
            const categoriasAndroid = processarTextoParaCategorias(
                document.getElementById("txtAndroid").value,
                v => aplicarPorcentagem(v, 30),
                identificarMarcaAndroid
            );

            const categoriasApple = processarTextoParaCategorias(
                document.getElementById("txtApple").value,
                v => aplicarFixo(v, 150),
                identificarMarcaApple
            );

            const categoriasSeminovos = processarTextoParaCategorias(
                document.getElementById("txtSeminovos").value,
                v => aplicarFixo(v, 150),
                identificarMarcaApple
            );

            const categoriasAcessorios = processarTextoParaCategorias(
                document.getElementById("txtAcessorios").value,
                v => aplicarPorcentagem(v, 30),
                identificarMarcaAcessorio
            );

            // Monta o JSON Unificado no padrão exato
            const jsonFinal = {
                "tabela_android_acessorios_diversos": {
                    "categorias": categoriasAndroid
                },
                "tabela_apple_lacrados": {
                    "categorias": categoriasApple
                },
                "tabela_iphones_seminovos": {
                    "categorias": categoriasSeminovos
                },
                "tabela_acessorios": {
                    "categorias": categoriasAcessorios
                }
            };

            const jsonString = JSON.stringify(jsonFinal, null, 2);
            const path = "tabelas_atualizadas.json";
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

            let sha = "";

            // Busca a SHA do arquivo existente se houver
            const getRes = await fetch(url, {
                headers: { "Authorization": `token ${token}` }
            });

            if (getRes.ok) {
                const fileData = await getRes.json();
                sha = fileData.sha;
            }

            // Envia a versão atualizada
            const contentBase64 = btoa(unescape(encodeURIComponent(jsonString)));

            const putRes = await fetch(url, {
                method: "PUT",
                headers: {
                    "Authorization": `token ${token}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    message: "Atualização automática com separação por marcas via Admin Web",
                    content: contentBase64,
                    sha: sha ? sha : undefined
                })
            });

            if (putRes.ok) {
                statusDiv.className = "status-success";
                statusDiv.innerText = " Sucesso! Tabela categorizada e atualizada no GitHub!";
            } else {
                const errData = await putRes.json();
                statusDiv.className = "status-error";
                statusDiv.innerText = " Erro ao enviar para o GitHub: " + errData.message;
            }
        } catch (err) {
            statusDiv.className = "status-error";
            statusDiv.innerText = " Erro de conexão: " + err.message;
        }
    }
</script>

</body>
</html>
